<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Edit item — UniCart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="edit-page">
  <h1>Edit item</h1>
  <p class="subtitle" id="subtitle">Loading…</p>

  <div class="field-row">
    <label>Title</label>
    <input type="text" id="f-title" placeholder="Product title">
  </div>
  <div class="field-row">
    <label>Price (USD)</label>
    <input type="number" id="f-price" placeholder="0.00" step="0.01" min="0">
  </div>
  <div class="field-row">
    <label>Category</label>
    <input type="text" id="f-category" placeholder="e.g. Tops, Dresses">
  </div>
  <div class="field-row">
    <label>Color</label>
    <input type="text" id="f-color" placeholder="e.g. Black, Navy Blue">
  </div>
  <div class="field-row">
    <label>Size (numeric)</label>
    <input type="number" id="f-sizing" placeholder="e.g. 38" step="1" min="0">
  </div>

  <div id="message" class="message"></div>

  <div class="form-actions">
    <button id="cancel-btn" class="btn btn-secondary">Cancel</button>
    <button id="save-btn" class="btn btn-primary">Save changes</button>
  </div>

  <script src="edit.js"></script>
</body>
</html>
