name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          COSMOS_CONNECTION_STRING: ${{ secrets.COSMOS_CONNECTION_STRING }}
        run: npm run build

      - name: Copy static assets into standalone
        run: |
          mkdir -p web/.next/standalone/web/.next/static
          cp -r web/.next/static/. web/.next/standalone/web/.next/static/
          if [ -d web/public ]; then cp -r web/public/. web/.next/standalone/web/public/; fi
          echo '{"name":"unicart","version":"0.1.0","scripts":{"start":"node server.js"}}' > web/.next/standalone/web/package.json

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: unicart-app
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DF44E95906D049A584753E2A98EAE0F9 }}
          package: web/.next/standalone/web
          clean: true
